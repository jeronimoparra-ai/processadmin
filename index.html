<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>DocPro™ | Generador Profesional APA 7 - Trabajos de Calidad</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50" style="font-family: 'Plus Jakarta Sans', sans-serif;">
  <div class="flex h-screen bg-slate-50">
    <!-- SIDEBAR -->
    <aside class="w-80 bg-gradient-to-b from-slate-900 via-slate-800 to-slate-900 text-white shadow-2xl flex flex-col border-r border-slate-700 overflow-hidden">
      <div class="p-8 border-b border-slate-700 bg-gradient-to-r from-slate-900 to-slate-800">
        <div class="flex items-center gap-3 mb-2">
          <div class="text-4xl">📝</div>
          <div>
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">DocPro</h1>
            <p class="text-xs text-slate-400 font-medium">APA 7 Professional</p>
          </div>
        </div>
      </div>

      <nav class="flex-1 p-6 space-y-3 overflow-y-auto">
        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider px-2 mb-4">Herramientas</div>
        <button class="nav-btn w-full text-left px-5 py-3.5 rounded-xl text-slate-200 hover:bg-slate-700/50 transition-all font-medium group relative overflow-hidden" data-view="panel">
          <span class="relative flex items-center gap-3"><span class="text-lg">📊</span><span>Panel de Control</span></span>
        </button>
        <button class="nav-btn w-full text-left px-5 py-3.5 rounded-xl text-slate-200 hover:bg-slate-700/50 transition-all font-medium group relative overflow-hidden" data-view="redactor">
          <span class="relative flex items-center gap-3"><span class="text-lg">✍️</span><span>Redactor Premium</span></span>
        </button>
        <button class="nav-btn w-full text-left px-5 py-3.5 rounded-xl text-slate-200 hover:bg-slate-700/50 transition-all font-medium group relative overflow-hidden" data-view="apa">
          <span class="relative flex items-center gap-3"><span class="text-lg">📚</span><span>Gestor APA 7</span></span>
        </button>
        <button class="nav-btn w-full text-left px-5 py-3.5 rounded-xl text-slate-200 hover:bg-slate-700/50 transition-all font-medium group relative overflow-hidden" data-view="simulador">
          <span class="relative flex items-center gap-3"><span class="text-lg">📈</span><span>Evaluador de Rubrica</span></span>
        </button>
        <button class="nav-btn w-full text-left px-5 py-3.5 rounded-xl text-slate-200 hover:bg-slate-700/50 transition-all font-medium group relative overflow-hidden" data-view="organizador">
          <span class="relative flex items-center gap-3"><span class="text-lg">🧠</span><span>Organizador de Ideas</span></span>
        </button>

        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider px-2 mb-2 mt-4">Utilidades</div>
        <button class="nav-btn w-full text-left px-5 py-3.5 rounded-xl text-slate-200 hover:bg-slate-700/50 transition-all font-medium group relative overflow-hidden" data-view="checklist">
          <span class="relative flex items-center gap-3"><span class="text-lg">✅</span><span>Checklist Inteligente</span></span>
        </button>
        <button class="nav-btn w-full text-left px-5 py-3.5 rounded-xl text-slate-200 hover:bg-slate-700/50 transition-all font-medium group relative overflow-hidden" data-view="exportar">
          <span class="relative flex items-center gap-3"><span class="text-lg">📤</span><span>Exportación a Word</span></span>
        </button>
      </nav>

      <div class="p-6 border-t border-slate-700 bg-gradient-to-r from-slate-800 to-slate-700">
        <div class="space-y-3">
          <div class="text-xs"><p class="text-slate-400 mb-1">📄 Documentos Creados</p><p class="text-2xl font-bold text-white">1</p></div>
          <div class="pt-3 border-t border-slate-600"><p class="text-xs text-slate-400">💾 Guardado en tiempo real</p><p class="text-xs text-slate-400">🔒 100% Privado & Local</p></div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <div class="bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 text-white px-12 py-8 shadow-2xl">
        <div class="flex items-start justify-between">
          <div>
            <h2 class="text-4xl font-black mb-2">DocPro™</h2>
            <p class="text-blue-100 text-lg font-medium">Diseña trabajos de calidad con normas APA 7</p>
          </div>
          <div class="text-6xl opacity-20">📝</div>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-12 bg-gradient-to-br from-slate-50 to-blue-50">
        <div id="main-workspace"></div>
      </div>
    </main>
  </div>

  <!-- EXPORT MODAL -->
  <div id="exportModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[80vh] flex flex-col border-2 border-blue-200">
      <div class="flex justify-between items-center p-6 bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 text-white rounded-t-xl border-b border-blue-300">
        <h2 class="text-2xl font-bold">📄 Documento en Markdown</h2>
        <button id="closeExportModal" class="text-blue-100 hover:text-white text-3xl font-bold">✕</button>
      </div>
      <div class="flex-1 overflow-y-auto p-6">
        <pre id="markdownOutput" class="bg-slate-900 text-emerald-400 rounded-lg p-6 font-mono text-sm overflow-x-auto border border-slate-700"></pre>
      </div>
      <div class="p-6 border-t-2 border-blue-200 flex gap-3 bg-gradient-to-r from-blue-50 to-purple-50">
        <button id="copyMarkdownBtn" class="flex-1 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg py-3 font-bold hover:shadow-lg transition-all shadow-md">📋 Copiar al Portapapeles</button>
      </div>
    </div>
  </div>

  <!-- Módulos JS -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/redactor.js"></script>
  <script src="js/apa.js"></script>
  <script src="js/rubrica.js"></script>
  <script src="js/checklist.js"></script>
  <script src="js/organizador.js"></script>
  <script src="js/exportador.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
