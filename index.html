<body class="page-root">
  <a class="skip-link" href="#app-main">Saltar al contenido principal</a>
  <div class="app-wrap">
    <aside class="side-panel">
      <div class="brand">
        <div class="flex items-center gap-3">
          <div class="brand-mark bg-blue-600 text-white rounded flex items-center justify-center w-10 h-10 shadow-sm" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6">
              <path d="M7 3.5h7.5L19 8v12.5A2.5 2.5 0 0 1 16.5 23h-9A2.5 2.5 0 0 1 5 20.5v-14A3 3 0 0 1 8 3.5z"></path>
              <path d="M14.5 3.5V8H19"></path>
              <path d="M8.5 12h7"></path>
              <path d="M8.5 15.5h7"></path>
            </svg>
          </div>
          <div>
            <h1 class="logo">ProcessAdmin</h1>
            <p class="tag">APA 7 & Redacción</p>
          </div>
        </div>
      </div>

      <nav class="nav-list" aria-label="Navegación principal">
        <div class="nav-section">Herramientas</div>
        <button class="nav-btn active" data-view="panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>
          <span>Panel de Control</span>
        </button>
        <button class="nav-btn" data-view="redactor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5z"></path></svg>
          <span>Redactor asistido</span>
        </button>
        <button class="nav-btn" data-view="apa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M4 5.5h16"></path><path d="M7 5.5v13"></path><path d="M17 5.5v13"></path><path d="M9 12h6"></path><path d="M9 16h6"></path></svg>
          <span>Gestor APA 7</span>
        </button>
        <button class="nav-btn" data-view="simulador">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M4 19h16"></path><path d="M6 15h3V7H6z"></path><path d="M11 15h3V4h-3z"></path><path d="M16 15h3v-6h-3z"></path></svg>
          <span>Evaluador de Rúbrica</span>
        </button>
        <button class="nav-btn" data-view="organizador">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h16"></path><path d="M8 6v12"></path></svg>
          <span>Organizador de Ideas</span>
        </button>

        <div class="sidebar-section-label mt-3">Utilidades</div>
        <button class="nav-btn" data-view="checklist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><rect x="3" y="3" width="18" height="18" rx="3"></rect><path d="M7 12l3 3 7-7"></path></svg>
          <span>Checklist Inteligente</span>
        </button>
        <button class="nav-btn" data-view="historial">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h10"></path><path d="M18 17v-6"></path><path d="M15 14l3 3 3-3"></path></svg>
          <span>Documentos guardados</span>
        </button>
        <button class="nav-btn" data-view="exportar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M12 3v10"></path><path d="M8 9l4 4 4-4"></path><path d="M5 21h14"></path></svg>
          <span>Exportación a Word</span>
        </button>
        <button class="nav-btn" data-view="legal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M4 6h16"></path><path d="M7 6v12"></path><path d="M17 6v12"></path><path d="M9 12h6"></path></svg>
          <span>Privacidad y términos</span>
        </button>
        <button class="nav-btn" data-view="acerca">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Acerca del autor
        </button>
      </nav>

      <div class="side-footer">
        <div class="side-status-card">
          <div class="meta mb-3">
            <div>
              <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Estado Local</div>
              <div id="saved-document-count" class="text-2xl font-bold text-slate-200">0</div>
              <div class="text-[11px] text-slate-400 mt-1">documentos guardados</div>
            </div>
          </div>
          <div class="pt-3 border-t border-slate-700/50">
            <a href="https://github.com/jeronimoparra-ai/processadmin" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 text-[12px] text-slate-400 hover:text-slate-200 transition-colors">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
              Ver en GitHub
            </a>
          </div>
        </div>
      </div>
    </aside>

    <main id="app-main" class="main-area" tabindex="-1">
      <header class="workspace-header">
        <div class="header-inner">
          <div>
            <h2 id="header-title" class="header-title">Panel de Control</h2>
            <p id="header-subtitle" class="header-subtitle">Resumen del progreso de tu documento</p>
          </div>
          <div class="flex items-center gap-4">
            <div class="header-actions hidden md:flex" aria-label="Acciones rápidas">
              <button class="dp-btn dp-btn-ghost header-quick" data-view="organizador">Nuevo</button>
              <button class="dp-btn dp-btn-ghost header-quick" data-view="exportar">Exportar</button>
            </div>
            <div class="header-pills">
              <div class="header-pill header-pill--success" title="El documento está guardado en localStorage">
                <svg id="save-indicator" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                  <path d="M7 3v6h10"></path>
                  <path d="M8 21v-8h8v8"></path>
                </svg>
                <span class="hidden sm:inline">Guardado</span>
              </div>
              <div class="header-pill header-pill--accent hidden sm:inline-flex">APA 7ª Ed.</div>
            </div>
          </div>
        </div>
      </header>

      <section class="content-area">
        <div id="main-workspace" class="workspace"></div>
      </section>
    </main>
  </div>

  <div id="exportModal" class="modal-backdrop" style="display:none" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="font-bold flex items-center gap-2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-blue-600"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          Vista previa del contenido
        </h2>
        <button id="closeExportModal" class="modal-close" aria-label="Cerrar vista previa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body bg-slate-50">
        <pre id="markdownOutput" class="markdown-output"></pre>
      </div>
      <div class="modal-footer">
        <button id="copyMarkdownBtn" class="dp-btn dp-btn-primary">Copiar al portapapeles</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
