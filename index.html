    const state = {
      activeView: 'panel',
      chartInstance: null,
      animationId: null,
      currentScore: 71,
      saveTimer: null,
      generatedCitations: [],
      countdownInterval: null,
      simulationHistory: [],
      workStartTime: localStorage.getItem('ws_work_start') ? parseInt(localStorage.getItem('ws_work_start')) : Date.now(),
      lastSaveTime: null

    const DELIVERY_DATE = new Date('2026-05-31T23:59:00');

    // ═══════════════════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════════════════

    function debounce(fn, delay) {
      return function(...args) {
        clearTimeout(state.saveTimer);
        state.saveTimer = setTimeout(() => fn(...args), delay);
      };
    }

    function saveField(key, value) {
      const statusEl = document.getElementById('save-status');
      if (statusEl) {
        statusEl.textContent = '💾 Guardando...';
        statusEl.classList.add('text-amber-400');
      }

      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(() => {
        localStorage.setItem(key, value);
        if (statusEl) {
          statusEl.textContent = '✔ Guardado automáticamente';
          statusEl.classList.remove('text-amber-400');
          statusEl.classList.add('text-green-600');
        }
        updateWriterProgress();
        if (typeof updateSectionCompleteness === 'function') {
          updateSectionCompleteness();
        }
        setTimeout(() => {
          if (statusEl) {
            statusEl.textContent = '';
            statusEl.classList.remove('text-green-600');
          }
        }, 3000);
      }, 800);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = '✅ ¡Copiado!';
        setTimeout(() => {
          btn.textContent = original;
        }, 2000);
      });
    }

    function formatDate(date) {
      return date.toLocaleDateString('es-ES', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      });
    }

    function updateCountdown() {
      const el = document.getElementById('countdown');
      if (!el) return;

      const now = Date.now();
      const target = DELIVERY_DATE.getTime();
      const diff = target - now;

      if (diff <= 0) {
        el.textContent = '⏰ Plazo vencido';
        el.classList.add('text-red-600');
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const mins = Math.floor((diff / 1000 / 60) % 60);
      const secs = Math.floor((diff / 1000) % 60);

      el.textContent = `${days} días, ${hours} horas, ${mins} min, ${secs} seg`;
    }

    function startCountdown() {
      if (state.countdownInterval) clearInterval(state.countdownInterval);
      updateCountdown();
      state.countdownInterval = setInterval(updateCountdown, 1000);
    }

    function stopCountdown() {
      if (state.countdownInterval) {
        clearInterval(state.countdownInterval);
        state.countdownInterval = null;
      }
    }

    function animateScore(targetValue) {
      const display = document.getElementById('score-display');
      if (!display) return;

      const start = state.currentScore;
      const startTime = performance.now();
      const duration = 400;

      if (state.animationId) cancelAnimationFrame(state.animationId);

      function tick(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const current = Math.round(start + (targetValue - start) * progress);

        display.textContent = current;

        if (progress < 1) {
          state.animationId = requestAnimationFrame(tick);
        } else {
          state.currentScore = targetValue;
          updateScoreVisuals(targetValue);
        }
      }

      state.animationId = requestAnimationFrame(tick);
    }

    function updateScoreVisuals(score) {
      const card = document.getElementById('score-card');
      if (!card) return;

      let bgClass, borderClass, badgeClass, badgeText;

      if (score >= 90) {
        bgClass = 'from-green-50 to-green-100';
        borderClass = 'border-green-500 shadow-2xl shadow-green-100/60';
        badgeClass = 'bg-green-600 text-white';
        badgeText = '🏆 Excelencia Académica';
      } else if (score >= 70) {
        bgClass = 'from-amber-50 to-amber-100';
        borderClass = 'border-amber-600 shadow-2xl shadow-amber-100/60';
        badgeClass = 'bg-amber-600 text-white';
        badgeText = '✔️ Aprobado Satisfactorio';
      } else {
        bgClass = 'from-orange-50 to-orange-100';
        borderClass = 'border-orange-500 shadow-2xl shadow-orange-100/60';
        badgeClass = 'bg-orange-600 text-white';
        badgeText = '⚠️ Requiere Revisión Urgente';
      }

      card.className = `rounded-2xl border-4 bg-gradient-to-br ${bgClass} ${borderClass} p-10 text-center`;

      const badge = document.getElementById('score-badge');
      if (badge) {
        badge.textContent = badgeText;
        badge.className = `${badgeClass} rounded-full px-6 py-2 text-sm font-bold mt-4 inline-block shadow-lg`;
      }
    }

    function calculateWriterProgress() {
      const fields = ['ws_empresa', 'ws_planeacion', 'ws_organizacion', 'ws_direccion', 'ws_control'];
      let filled = 0;

      fields.forEach(key => {
        const val = localStorage.getItem(key) || '';
        if (val.trim().length > 5) filled++;
      });

      return Math.round((filled / fields.length) * 100);
    }

    function updateWriterProgress() {
      const progress = calculateWriterProgress();
      const bar = document.getElementById('progress-bar');
      const label = document.getElementById('progress-label');
      const exportBtn = document.getElementById('export-btn');

      if (bar) {
        bar.style.width = progress + '%';
        if (progress === 100) {
          bar.classList.remove('bg-indigo-500');
          bar.classList.add('bg-emerald-500');
        } else {
          bar.classList.remove('bg-emerald-500');
          bar.classList.add('bg-indigo-500');
        }
      }

      if (label) {
        if (progress === 100) {
          label.textContent = '✅ Borrador completo — listo para exportar';
        } else {
          label.textContent = `Progreso del borrador: ${progress}%`;
        }
      }

      if (exportBtn) {
        if (progress === 100) {
          exportBtn.classList.remove('opacity-40', 'cursor-not-allowed');
          exportBtn.classList.add('hover:bg-indigo-700');
        } else {
          exportBtn.classList.add('opacity-40', 'cursor-not-allowed');
          exportBtn.classList.remove('hover:bg-indigo-700');
        }
      }
    }

    function updateSectionProgress(checks) {
      const count = checks.filter(c => c).length;
      const total = checks.length;
      const percent = (count / total) * 100;

      const bar = document.getElementById('section-progress');
      const counter = document.getElementById('section-count');

      if (bar) bar.style.width = percent + '%';
      if (counter) counter.textContent = `${count}/${total}`;
    }

    function updateSectionCompleteness() {
      // Calculate completeness for each section based on word count
      const fields = {
        planeacion: localStorage.getItem('ws_planeacion') || '',
        organizacion: localStorage.getItem('ws_organizacion') || '',
        direccion: localStorage.getItem('ws_direccion') || '',
        control: localStorage.getItem('ws_control') || ''
      };

      const targetWords = { planeacion: 250, organizacion: 150, direccion: 150, control: 150 };
      let totalPercent = 0;
      let totalWords = 0;

      Object.keys(fields).forEach(key => {
        const wordCount = fields[key].trim().split(/\s+/).filter(w => w.length > 0).length;
        totalWords += wordCount;
        const percent = Math.min((wordCount / targetWords[key]) * 100, 100);
        totalPercent += percent;

        const bar = document.getElementById(`${key}-bar`);
        const status = document.getElementById(`${key}-status`);
        if (bar) bar.style.width = percent + '%';
        if (status) status.textContent = Math.round(percent) + '%';
      });

      // Update overall progress
      const overallPercent = Math.round(totalPercent / 4);
      const overallBar = document.getElementById('overall-progress-bar');
      const overallText = document.getElementById('overall-progress-percent');
      if (overallBar) overallBar.style.width = overallPercent + '%';
      if (overallText) overallText.textContent = overallPercent + '%';

      // Update project statistics
      const statWords = document.getElementById('stat-content-words');
      if (statWords) statWords.textContent = totalWords;

      const workStartTime = localStorage.getItem('ws_work_start') ? new Date(parseInt(localStorage.getItem('ws_work_start'))) : null;
      const workMinutes = workStartTime ? Math.round((Date.now() - workStartTime.getTime()) / 1000 / 60) : 0;
      const statTime = document.getElementById('stat-work-time');
      if (statTime) statTime.textContent = workMinutes + ' min';

      const statCitations = document.getElementById('stat-citations');
      if (statCitations) statCitations.textContent = state.generatedCitations.length;

      const statSimulations = document.getElementById('stat-simulations');
      if (statSimulations) statSimulations.textContent = state.simulationHistory.length;
    }

                  <span class="bg-amber-100 text-amber-700 rounded-full px-3 py-1 text-sm font-bold slider-value" data-slider="conclusiones">10</span>
                </div>
                <input id="slider-conclusiones" type="range" min="0" max="15" value="10" class="w-full accent-amber-600" data-descriptor="descriptor-conclusiones">
                <p id="descriptor-conclusiones" class="text-xs text-gray-500 italic mt-3">Conclusiones presentes pero con desarrollo limitado</p>
              </div>
            </div>
          </div>

          <!-- RIGHT: VISUALIZER -->
          <div class="space-y-6">
            <!-- Score Card -->
            <div id="score-card" class="rounded-2xl border-4 border-amber-600 bg-gradient-to-br from-amber-50 to-amber-100 shadow-2xl p-10 text-center">
              <p class="text-amber-700 text-sm font-bold mb-2 tracking-wide">CALIFICACIÓN ESTIMADA</p>
              <p id="score-display" class="text-8xl font-black text-amber-900">71</p>
              <p class="text-amber-700 text-2xl mt-1">/100</p>
              <div id="score-badge" class="bg-amber-600 text-white rounded-full px-6 py-2 text-sm font-bold mt-4 inline-block shadow-lg">✔️ Aprobado Satisfactorio</div>
            </div>

            <!-- Chart -->
            <div class="bg-white rounded-xl border-2 border-amber-200 p-6 shadow-md">
              <canvas id="donutChart" height="220"></canvas>
            </div>

            <!-- Rúbrica Info -->
            <div class="bg-amber-50 rounded-xl border-2 border-amber-200 p-5">
              <p class="text-xs font-bold text-amber-900 mb-3">📋 DESGLOSE DE LA RÚBRICA:</p>
              <div class="space-y-2 text-xs text-gray-700">
                <div class="flex justify-between">
                  <span>Conceptos (máx. 35 pts):</span>
                  <span id="show-conceptos" class="font-bold text-amber-700">25</span>
                </div>
                <div class="flex justify-between">
                  <span>Análisis (máx. 25 pts):</span>
                  <span id="show-analisis" class="font-bold text-amber-700">18</span>
                </div>
                <div class="flex justify-between">
                  <span>Calidad (máx. 25 pts):</span>
                  <span id="show-calidad" class="font-bold text-amber-700">18</span>
                </div>
                <div class="flex justify-between">
                  <span>Conclusiones (máx. 15 pts):</span>
                  <span id="show-conclusiones" class="font-bold text-amber-700">10</span>
                </div>
              </div>
            </div>

            <!-- Simulation History -->
            <div class="bg-white rounded-xl border-2 border-amber-200 p-5 mt-6">
              <div class="flex justify-between items-center mb-4">
                <p class="text-sm font-bold text-amber-900">⏱️ Historial de Simulaciones</p>
                <button id="clear-history" class="text-xs text-red-600 hover:text-red-700 font-semibold">Limpiar</button>
              </div>
              <div id="simulation-history" class="space-y-2 max-h-40 overflow-y-auto text-xs"></div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('main-workspace').innerHTML = html;
      stopCountdown();

      const descriptors = {
        conceptos: {
          high: 'Excelente dominio conceptual y presentación impecable',
          mid: 'Buen manejo del tema con algunas imprecisiones menores',
          low: 'Conceptos incompletos o presentación deficiente'
        },
        analisis: {
          high: 'Análisis profundo con propuestas innovadoras',
          mid: 'Análisis adecuado con conexión al contexto empresarial',
          low: 'Análisis superficial o sin relación con la empresa real'
        },
        calidad: {
          high: 'Documento impecable: normas APA, ortografía y formato',
          mid: 'Presenta la mayoría de requisitos formales correctamente',
          low: 'Incumple normas de presentación o tiene errores graves'
        },
        conclusiones: {
          high: 'Conclusiones pertinentes, sólidas y bien argumentadas',
          mid: 'Conclusiones presentes pero con desarrollo limitado',
          low: 'Conclusiones ausentes, genéricas o sin argumentación'
        }
      };

      const ranges = {
        conceptos: 35,
        analisis: 25,
        calidad: 25,
        conclusiones: 15
      };

      function getDescriptor(key, value, max) {
        const high = Math.ceil(max * 0.8);
        if (value >= high) return descriptors[key].high;
        const mid = Math.ceil(max * 0.5);
        return value >= mid ? descriptors[key].mid : descriptors[key].low;
      }

      function updateScore() {
        const c = parseInt(document.getElementById('slider-conceptos').value);
        const a = parseInt(document.getElementById('slider-analisis').value);
        const ca = parseInt(document.getElementById('slider-calidad').value);
        const co = parseInt(document.getElementById('slider-conclusiones').value);
        const total = c + a + ca + co;

        animateScore(total);

        if (state.chartInstance) {
          state.chartInstance.data.datasets[0].data = [c, a, ca, co];
          state.chartInstance.update();
        }

        // Save to history
        const now = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        state.simulationHistory.unshift({ score: total, time: now });
        if (state.simulationHistory.length > 10) state.simulationHistory.pop();

        renderSimulationHistory();
      }

      function renderSimulationHistory() {
        const historyEl = document.getElementById('simulation-history');
        if (!historyEl) return;

        if (state.simulationHistory.length === 0) {
          historyEl.innerHTML = '<p class="text-gray-500 italic">Sin simulaciones guardadas</p>';
          return;
        }

        historyEl.innerHTML = state.simulationHistory.map((sim, idx) => `
          <div class="flex justify-between items-center p-2 bg-amber-50 rounded border-l-2 border-amber-600">
            <span class="text-gray-700"><strong>${sim.score}</strong> pts</span>
            <span class="text-gray-500 text-xs">${sim.time}</span>
          </div>
        `).join('');
      }

      // Slider listeners
      ['conceptos', 'analisis', 'calidad', 'conclusiones'].forEach(key => {
        const slider = document.getElementById(`slider-${key}`);
        slider.addEventListener('input', (e) => {
          const val = parseInt(e.target.value);
          const max = ranges[key];
          document.querySelector(`[data-slider="${key}"]`).textContent = val;
          document.getElementById(`show-${key}`).textContent = val;
          document.getElementById(`descriptor-${key}`).textContent = getDescriptor(key, val, max);
          updateScore();
        });
      });

      // Initialize chart
      const ctx = document.getElementById('donutChart').getContext('2d');
      state.chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Conceptos (35 pts)', 'Análisis (25 pts)', 'Calidad (25 pts)', 'Conclusiones (15 pts)'],
          datasets: [{
            data: [25, 18, 18, 10],
            backgroundColor: ['#a67c52', '#c9956b', '#d4a574', '#e8c1a0'],
            borderColor: '#ffffff',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                font: { family: "'Plus Jakarta Sans', sans-serif", size: 12, weight: '600' },
                padding: 15,
                color: '#78350f'
              }
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  return ctx.label + ': ' + ctx.parsed + ' pts';
                }
              }
            }
          }
        }
      });

      // Clear history button
      const clearBtn = document.getElementById('clear-history');
      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          state.simulationHistory = [];
          renderSimulationHistory();
        });
      }

      renderSimulationHistory();
    }

    function buildAPA() {
      const html = `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <!-- LEFT: GENERATOR -->
          <div>
            <h2 class="text-3xl font-bold text-amber-900 mb-2">📖 Gestor de Referencias APA 7ª Edición</h2>
            <p class="text-gray-600 mb-8">Completa los campos de tu fuente bibliográfica para generar la cita en formato APA automáticamente.</p>

            <div class="space-y-4 mb-6">
              <div>
                <label class="block text-sm font-bold text-amber-900 mb-2">Autor o Institución *</label>
                <input id="apa-autor" type="text" placeholder="Ej: García López, M." class="w-full border-2 border-amber-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all bg-amber-50">
              </div>

              <div>
                <label class="block text-sm font-bold text-amber-900 mb-2">Año de publicación *</label>
                <input id="apa-anio" type="number" min="1900" max="2099" placeholder="Ej: 2023" class="w-full border-2 border-amber-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all bg-amber-50">
              </div>

              <div>
                <label class="block text-sm font-bold text-amber-900 mb-2">Título del documento o artículo *</label>
                <input id="apa-titulo" type="text" placeholder="Ej: Fundamentos de administración..." class="w-full border-2 border-amber-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all bg-amber-50">
              </div>

              <div>
                <label class="block text-sm font-bold text-amber-900 mb-2">Editorial, revista o institución fuente</label>
                <input id="apa-fuente" type="text" placeholder="Ej: Editorial Planeta" class="w-full border-2 border-amber-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all bg-amber-50">
              </div>

              <div>
                <label class="block text-sm font-bold text-amber-900 mb-2">URL (si es fuente en línea)</label>
                <input id="apa-url" type="url" placeholder="https://..." class="w-full border-2 border-amber-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all bg-amber-50">
              </div>
            </div>

            <div class="mb-6">
              <button id="generate-apa" class="w-full bg-amber-600 text-white rounded-lg px-5 py-3 font-bold hover:bg-amber-700 transition-colors shadow-lg">⚡ Generar Cita APA</button>
              <p id="apa-error" class="text-red-600 text-xs mt-2 hidden font-semibold"></p>
            </div>

            <div id="apa-result-container" class="hidden">
              <div class="bg-amber-50 border-2 border-amber-200 rounded-xl p-5 mb-4">
                <p class="text-amber-900 text-xs font-bold mb-2 tracking-wide">✓ CITA GENERADA:</p>
                <p id="apa-result" class="font-mono text-sm text-amber-950 leading-relaxed"></p>
              </div>
              <button id="copy-apa" class="w-full bg-amber-600 text-white rounded-lg px-4 py-3 text-sm font-bold hover:bg-amber-700 transition-colors shadow-lg">📋 Copiar cita al portapapeles</button>
            </div>

            <div id="citations-list" class="mt-10">
              <h3 class="text-xl font-bold text-amber-900 mb-4 flex items-center gap-2">
                <span>📚</span> Referencias generadas en esta sesión
              </h3>
              <ul id="citations-items" class="space-y-3"></ul>
            </div>
          </div>

          <!-- RIGHT: CHECKLIST -->
          <div>
            <div class="bg-gradient-to-b from-amber-900 to-amber-950 text-amber-50 rounded-2xl p-8 sticky top-6 shadow-xl">
              <h3 class="text-2xl font-bold mb-3 flex items-center gap-3">
                <span>✅</span> Checklist Final de Calidad
              </h3>
              <p class="text-amber-100 text-sm mb-8">Verifica cada punto antes de entregar tu proyecto. Son requisitos fundamentales.</p>

              <div class="space-y-3 mb-8 max-h-96 overflow-y-auto pr-2">
                ${[
                  { icon: '📄', text: 'Portada completa con datos del estudiante' },
                  { icon: '📝', text: 'Introducción redactada (mínimo 200 palabras)' },
                  { icon: '🎯', text: 'Misión y Visión claramente definidas' },
                  { icon: '🔍', text: 'Matriz DOFA con mínimo 3 ítems por cuadrante' },
                  { icon: '🏢', text: 'Organigrama o descripción de niveles incluida' },
                  { icon: '👥', text: 'Análisis de liderazgo y motivación (teorías aplicadas)' },
                  { icon: '📊', text: 'Mínimo 4 indicadores de gestión (KPIs) con fórmula' },
                  { icon: '💡', text: 'Conclusiones basadas en análisis (mín. 150 palabras)' },
                  { icon: '📚', text: 'Referencias en formato APA 7ª edición' },
                  { icon: '✏️', text: 'Ortografía y redacción revisadas' },
                  { icon: '💾', text: 'Archivo guardado como documento único (PDF o Word)' },
                  { icon: '⏰', text: 'Entrega realizada antes del 31 de mayo de 2026' }
                ].map((item, idx) => `
                  <label class="flex items-start gap-3 cursor-pointer hover:bg-amber-800/40 p-2 rounded transition-colors group">
                    <input type="checkbox" class="apa-check w-4 h-4 mt-1 accent-green-400 flex-shrink-0" data-check="${idx}">
                    <span class="text-sm">
                      <span class="mr-2">${item.icon}</span>${item.text}
                    </span>
                  </label>
                `).join('')}
              </div>

              <div class="mb-6">
                <p class="text-xs text-amber-200 mb-2 font-semibold tracking-wide" id="checklist-count">0 de 12 criterios verificados</p>
                <div class="h-3 bg-amber-800 rounded-full overflow-hidden">
                  <div id="checklist-bar" class="h-full bg-green-500 w-0 transition-all duration-300 rounded-full"></div>
                </div>
              </div>

              <div id="completion-banner" class="hidden bg-green-600 text-white rounded-xl p-5 text-center font-bold shadow-lg">
                <p class="text-lg">🎉 ¡Proyecto listo para entregar!</p>
                <p class="text-xs mt-2 text-green-100">Todos los criterios han sido verificados</p>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('main-workspace').innerHTML = html;
      stopCountdown();

      // APA Generator
      document.getElementById('generate-apa').addEventListener('click', () => {
        const autor = document.getElementById('apa-autor').value.trim();
        const titulo = document.getElementById('apa-titulo').value.trim();

        const errorEl = document.getElementById('apa-error');

        if (!autor || !titulo) {
          errorEl.textContent = '⚠️ Completa al menos Autor y Título para generar la cita.';
          errorEl.classList.remove('hidden');
          document.getElementById('generate-apa').classList.add('animate-shake');
          setTimeout(() => {
            document.getElementById('generate-apa').classList.remove('animate-shake');
          }, 500);
          return;
        }

        if (autor.length < 3 || titulo.length < 5) {
          errorEl.textContent = '⚠️ Autor y Título deben tener más caracteres.';
          errorEl.classList.remove('hidden');
          return;
        }

        errorEl.classList.add('hidden');

        const anio = document.getElementById('apa-anio').value || 's.f.';
        const fuente = document.getElementById('apa-fuente').value.trim();
        const url = document.getElementById('apa-url').value.trim();

        let citation = `${autor} (${anio}). <em>${titulo}</em>`;
        if (fuente) citation += `. ${fuente}`;
        if (url) citation += `. Recuperado de ${url}`;

        document.getElementById('apa-result').innerHTML = citation;
        document.getElementById('apa-result-container').classList.remove('hidden');

        state.generatedCitations.push(citation);
        renderCitations();

        // Clear inputs for next citation
        document.getElementById('apa-titulo').value = '';
        document.getElementById('apa-anio').value = '';
        document.getElementById('apa-fuente').value = '';
        document.getElementById('apa-url').value = '';
      });

      document.getElementById('copy-apa').addEventListener('click', (e) => {
        const text = document.getElementById('apa-result').innerText;
        copyToClipboard(text);
      });

      function renderCitations() {
        const list = document.getElementById('citations-items');
        list.innerHTML = state.generatedCitations.map((cit, idx) => `
          <li class="flex justify-between items-start gap-2 bg-amber-700/30 border border-amber-600/50 p-4 rounded-lg text-xs text-amber-100">
            <span><strong class="text-amber-200">${idx + 1}.</strong> ${cit.replace(/<\/?em>/g, '')}</span>
            <button class="flex-shrink-0 text-red-400 hover:text-red-300 ml-2 font-bold" data-delete="${idx}">✕</button>
          </li>
        `).join('');

        document.querySelectorAll('[data-delete]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const idx = parseInt(e.target.dataset.delete);
            state.generatedCitations.splice(idx, 1);
            renderCitations();
          });
        });
      }

      // Checklist
      const saved = localStorage.getItem('ws_checklist_apa');
      const checks = saved ? JSON.parse(saved) : Array(12).fill(false);

      document.querySelectorAll('.apa-check').forEach((el, idx) => {
        el.checked = checks[idx];
        el.addEventListener('change', () => {
          checks[idx] = el.checked;
          localStorage.setItem('ws_checklist_apa', JSON.stringify(checks));
          updateChecklistProgress(checks);
        });
      });

      function updateChecklistProgress(checks) {
        const count = checks.filter(c => c).length;
        const total = checks.length;
        const percent = (count / total) * 100;

        document.getElementById('checklist-count').textContent = `${count} de ${total} criterios verificados`;
        document.getElementById('checklist-bar').style.width = percent + '%';

        const banner = document.getElementById('completion-banner');
        if (count === total) {
          banner.classList.remove('hidden');
        } else {
          banner.classList.add('hidden');
        }
      }

      updateChecklistProgress(checks);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ROUTER
    // ═══════════════════════════════════════════════════════════════════════

    function navigate(viewId) {
      stopCountdown();

      if (state.chartInstance) {
        state.chartInstance.destroy();
        state.chartInstance = null;
      }

      if (state.animationId) {
        cancelAnimationFrame(state.animationId);
        state.animationId = null;
      }

      // Warning for incomplete work
      if (viewId !== 'redactor' && state.activeView === 'redactor') {
        const empresa = localStorage.getItem('ws_empresa') || '';
        const fields = [
          localStorage.getItem('ws_planeacion') || '',
          localStorage.getItem('ws_organizacion') || '',
          localStorage.getItem('ws_direccion') || '',
          localStorage.getItem('ws_control') || ''
        ];
        
        const filledFields = fields.filter(f => f.trim().length > 50).length;
        
        if (!empresa || filledFields < 2) {
          const confirmNav = confirm(
            '⚠️ Tu trabajo en el redactor parece incompleto.\n\n' +
            '¿Estás seguro de que deseas navegar?\n' +
            '(Los datos se guardan automáticamente)'
          );
          if (!confirmNav) return;
        }
      }

      state.activeView = viewId;

      switch (viewId) {
        case 'panel':
          buildPanel();
          break;
        case 'redactor':
          buildRedactor();
          break;
        case 'simulador':
          buildSimulador();
          break;
        case 'apa':
          buildAPA();
          break;
      }

      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.dataset.view === viewId) {
          btn.classList.remove('text-amber-200', 'hover:bg-amber-800/50');
          btn.classList.add('bg-amber-700', 'text-amber-50');
          btn.querySelector(':last-child').classList.remove('hidden');
        } else {
          btn.classList.add('text-amber-200', 'hover:bg-amber-800/50');
          btn.classList.remove('bg-amber-700', 'text-amber-50');
          btn.querySelector(':last-child').classList.add('hidden');
        }
      });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════════════

    document.addEventListener('DOMContentLoaded', () => {
      // Save work start time on first load
      if (!localStorage.getItem('ws_work_start')) {
        localStorage.setItem('ws_work_start', Date.now().toString());
      }

      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          navigate(btn.dataset.view);
        });
      });

      navigate('panel');
    });
  </script>
</body>
