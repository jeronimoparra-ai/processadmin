            </div>
          </div>
          <div class="header-pills">
            <div class="header-pill header-pill--success" title="El documento está guardado en localStorage">

                <path d="M7 3v6h10"></path>
                <path d="M8 21v-8h8v8"></path>

      <section class="content-area">
        <div id="main-workspace" class="workspace">
          <!-- Estado de carga inicial — JS lo reemplaza al inicializar -->
          <div id="workspace-loader" class="flex flex-col items-center justify-center h-full min-h-96 gap-4 text-slate-400">
            <div class="w-16 h-16 animate-pulse text-[var(--dp-primary)]">
              <img src="assets/icons/redactor.svg" alt="Loading" class="w-full h-full">
            </div>
            <p class="text-lg font-medium">Cargando ProcessAdmin...</p>
            <p class="text-sm text-slate-400">Si esta pantalla no desaparece, recarga la página (F5)</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="exportModal" class="modal-backdrop" style="display:none" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="font-bold flex items-center gap-2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-blue-600"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          Vista previa del contenido
        </h2>
        <button id="closeExportModal" class="modal-close" aria-label="Cerrar vista previa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body bg-slate-50">
        <pre id="markdownOutput" class="markdown-output"></pre>
      </div>
      <div class="modal-footer">
        <button id="copyMarkdownBtn" class="dp-btn dp-btn-primary">Copiar al portapapeles</button>
      </div>
    </div>
  </div>

  <!-- Manejo global de errores JS -->
  <script>
    window.addEventListener('error', function(e) {
      const workspace = document.getElementById('main-workspace');
      if (workspace && workspace.querySelector('#workspace-loader')) {
        workspace.innerHTML = `
          <div class="flex flex-col items-center justify-center h-full min-h-96 gap-4 text-red-400 p-8">
            <div class="w-16 h-16 text-red-500">
              <img src="assets/icons/validation.svg" alt="Error" class="w-full h-full">
            </div>
            <p class="text-xl font-bold text-slate-700">Error al cargar ProcessAdmin</p>
            <p class="text-sm text-slate-500 text-center max-w-md">
              No se pudo inicializar la aplicación. 
              Verifica tu conexión a internet y recarga la página.
            </p>
            <p class="text-xs text-slate-400 font-mono bg-slate-100 p-3 rounded-lg max-w-lg break-all">
              ${e.filename ? e.filename.split('/').pop() : 'script'}: ${e.message}
            </p>
            <button onclick="location.reload()" 
              class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
              Recargar página
            </button>
          </div>
        `;
      }
    });
  </script>
